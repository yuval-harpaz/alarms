<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>Alarm Origin Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Date overlay --- */
        #date-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #date-box {
            background: #1e1e2e;
            color: #cdd6f4;
            border-radius: 12px;
            padding: 28px 36px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        #date-box h2 {
            margin-bottom: 14px;
            font-size: 1.3em;
        }

        #date-box .sub {
            font-size: 0.85em;
            color: #a6adc8;
            margin-bottom: 10px;
        }

        #start-input {
            font-size: 1.1em;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #585b70;
            background: #313244;
            color: #cdd6f4;
            direction: ltr;
            width: 200px;
            text-align: center;
        }

        #date-ok {
            margin-top: 14px;
            padding: 8px 28px;
            font-size: 1.05em;
            border: none;
            border-radius: 6px;
            background: #89b4fa;
            color: #1e1e2e;
            cursor: pointer;
            font-weight: 600;
        }

        #date-ok:hover {
            background: #74c7ec;
        }

        /* --- Sidebar --- */
        #sidebar {
            width: 520px;
            min-width: 400px;
            background: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            border-left: 2px solid #313244;
        }

        #sidebar-header {
            padding: 10px 14px;
            background: #181825;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        #sidebar-header h3 {
            font-size: 1.05em;
            flex: 1;
        }

        .header-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9em;
        }

        #download-btn {
            background: #a6e3a1;
            color: #1e1e2e;
        }

        #download-btn:hover {
            background: #94e2d5;
        }

        #clear-btn {
            background: #f38ba8;
            color: #1e1e2e;
        }

        #clear-btn:hover {
            background: #eba0ac;
        }

        #checklist-wrap {
            flex: 1;
            overflow-y: auto;
        }

        #checklist {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
        }

        #checklist thead {
            position: sticky;
            top: 0;
            z-index: 2;
        }

        #checklist th {
            background: #313244;
            padding: 6px 6px;
            text-align: right;
            border-bottom: 2px solid #585b70;
            white-space: nowrap;
        }

        #checklist td {
            padding: 4px 6px;
            border-bottom: 1px solid #313244;
            vertical-align: middle;
        }

        #checklist .col-id {
            width: 50px;
            text-align: center;
            direction: ltr;
        }

        #checklist .col-time {
            width: 110px;
            direction: ltr;
            font-size: 0.9em;
            white-space: nowrap;
        }

        #checklist .col-desc {
            max-width: 130px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #checklist .col-chk {
            width: 30px;
            text-align: center;
        }

        #checklist .col-origin {
            width: 100px;
        }

        #checklist input[type=checkbox] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        #checklist input.origin-input {
            width: 100%;
            background: #313244;
            border: 1px solid #585b70;
            color: #cdd6f4;
            padding: 3px 5px;
            border-radius: 4px;
            font-size: 0.95em;
        }

        #checklist input.origin-input:focus {
            border-color: #89b4fa;
            outline: none;
        }

        #checklist input.origin-input.locked {
            background: #45475a;
            color: #a6adc8;
            cursor: default;
        }

        /* autocomplete dropdown */
        .autocomplete-list {
            position: absolute;
            z-index: 100;
            background: #313244;
            border: 1px solid #585b70;
            border-radius: 4px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.9em;
        }

        .autocomplete-list div {
            padding: 4px 8px;
            cursor: pointer;
            color: #cdd6f4;
        }

        .autocomplete-list div:hover,
        .autocomplete-list div.selected {
            background: #585b70;
        }

        .color-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            vertical-align: middle;
            margin-left: 4px;
        }

        #map {
            flex: 1;
        }

        .leaflet-control-attribution {
            background: transparent !important;
            font-size: 13px;
            color: black;
            text-shadow: 0 0 3px white;
        }
    </style>
</head>

<body>
    <!-- Date / ID prompt overlay -->
    <div id="date-overlay">
        <div id="date-box">
            <h2>בחר תאריך התחלה או מזהה</h2>
            <div class="sub">תאריך (YYYY-MM-DD) או מספר ID</div>
            <input type="text" id="start-input" value="2026-02-28" placeholder="2026-02-28 or 5770">
            <br>
            <button id="date-ok">אישור</button>
        </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar" style="display:none;">
        <div id="sidebar-header">
            <h3>אירועים</h3>
            <button id="clear-btn" class="header-btn">נקה ☐</button>
            <button id="download-btn" class="header-btn">⬇ הורד CSV</button>
        </div>
        <div id="checklist-wrap">
            <table id="checklist">
                <thead>
                    <tr>
                        <th class="col-id">ID</th>
                        <th class="col-time">זמן</th>
                        <th class="col-desc">תיאור</th>
                        <th class="col-chk">☑</th>
                        <th class="col-origin">מקור</th>
                    </tr>
                </thead>
                <tbody id="checklist-body"></tbody>
            </table>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script>
        const PALETTE = [
            '#e6194b', '#3cb44b', '#4363d8', '#f58231', '#911eb4',
            '#42d4f4', '#f032e6', '#bfef45', '#fabed4', '#469990',
            '#dcbeff', '#ffe119'
        ];

        const map = L.map('map').setView([31.5, 34.75], 8);
        L.tileLayer('https://cdnil.govmap.gov.il/xyz/heb/{z}/{x}/{y}.png', {
            attribution: '© המרכז למיפוי ישראל www.govmap.gov.il'
        }).addTo(map);

        let filteredRows = [];
        let coordMap = {};
        let idData = [];       // [{key, id, desc, existingOrigin, time, rows:[...]}, ...]
        let markerGroups = {};
        let userOrigins = {};  // track newly typed origins for autocomplete

        // ─── Pre-fill start point ───
        (function initStartPoint() {
            fetch('https://raw.githubusercontent.com/yuval-harpaz/alarms/master/data/alarms.csv')
                .then(r => r.text())
                .then(csv => {
                    const alarms = Papa.parse(csv, { header: true, skipEmptyLines: true }).data;
                    let lastFilledIdx = -1;
                    alarms.forEach((r, idx) => {
                        if (r.origin && r.origin.trim()) {
                            lastFilledIdx = idx;
                        }
                    });

                    let targetId = "2026-03-01"; // Fallback
                    if (lastFilledIdx !== -1) {
                        const lastFilledId = alarms[lastFilledIdx].id;
                        let nextEmptyIdx = lastFilledIdx + 1;
                        while (nextEmptyIdx < alarms.length && alarms[nextEmptyIdx].id === lastFilledId) {
                            nextEmptyIdx++;
                        }
                        if (nextEmptyIdx < alarms.length) {
                            targetId = alarms[nextEmptyIdx].id;
                        }
                    } else if (alarms.length > 0) {
                        targetId = alarms[0].id;
                    }
                    document.getElementById('start-input').value = targetId;
                });
        })();

        // ─── Start button ───
        document.getElementById('date-ok').addEventListener('click', () => {
            const val = document.getElementById('start-input').value.trim();
            document.getElementById('date-overlay').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            loadData(val);
        });
        document.getElementById('start-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('date-ok').click();
        });

        // ─── Clear all checkboxes ───
        document.getElementById('clear-btn').addEventListener('click', () => {
            document.querySelectorAll('#checklist input[type=checkbox]').forEach(cb => {
                if (cb.checked) {
                    cb.checked = false;
                    hideMarkers(cb.dataset.key);
                }
            });
        });

        // ─── Load & process ───
        function loadData(startVal) {
            Promise.all([
                fetch('https://raw.githubusercontent.com/yuval-harpaz/alarms/master/data/alarms.csv').then(r => r.text()),
                fetch('https://raw.githubusercontent.com/yuval-harpaz/alarms/master/data/coord.csv').then(r => r.text())
            ]).then(([alarmsCsv, coordCsv]) => {
                // Parse coords
                Papa.parse(coordCsv, { header: true, skipEmptyLines: true }).data.forEach(r => {
                    const loc = r.loc?.trim();
                    if (loc) coordMap[loc] = { lat: parseFloat(r.lat), lng: parseFloat(r.long) };
                });

                // Parse alarms
                const allAlarms = Papa.parse(alarmsCsv, { header: true, skipEmptyLines: true }).data;

                // Determine if input is an ID (integer) or a date
                const isId = /^\d+$/.test(startVal);
                if (isId) {
                    const ID_EPOCH = '2023-03-08 03:04:19';
                    const startId = startVal;
                    const idRow = allAlarms.find(r => r.id === startId && r.time >= ID_EPOCH);
                    if (idRow) {
                        const startTime = idRow.time;
                        filteredRows = allAlarms.filter(r => r.time && r.time >= startTime);
                    } else {
                        filteredRows = [];
                    }
                } else {
                    filteredRows = allAlarms.filter(r => r.time && r.time >= startVal);
                }

                // ─── Build unique GUI rows ───
                // Split by: id + description (threat type) + existing origin
                // This handles three cases:
                //   1. Same id, different description (missiles vs drones) → separate rows
                //   2. Same id, same description, different pre-existing origin → separate rows
                //   3. Same id, same description, no origin (or one origin) → single row
                const keyMap = new Map(); // composite key → {id, desc, existingOrigin, time, rows}
                filteredRows.forEach(r => {
                    const id = r.id;
                    const desc = (r.description || '').trim();
                    const origin = (r.origin || '').trim();
                    const key = id + '__' + desc + '__' + origin;
                    if (!keyMap.has(key)) {
                        keyMap.set(key, { id, desc, existingOrigin: origin, time: r.time, rows: [] });
                    }
                    keyMap.get(key).rows.push(r);
                });

                idData = Array.from(keyMap.values()).map((val, i) => ({
                    key: Array.from(keyMap.keys())[i],
                    ...val
                }));

                buildChecklist();
            });
        }

        // ─── Build checklist ───
        function buildChecklist() {
            const tbody = document.getElementById('checklist-body');
            tbody.innerHTML = '';

            idData.forEach((item, idx) => {
                const color = PALETTE[idx % PALETTE.length];
                const tr = document.createElement('tr');

                // ID
                const tdId = document.createElement('td');
                tdId.className = 'col-id';
                tdId.textContent = item.id;
                tr.appendChild(tdId);

                // Time
                const tdTime = document.createElement('td');
                tdTime.className = 'col-time';
                const t = item.time;
                tdTime.textContent = t ? t.substring(5, 16) : '';
                tdTime.title = t;
                tr.appendChild(tdTime);

                // Description
                const tdDesc = document.createElement('td');
                tdDesc.className = 'col-desc';
                tdDesc.textContent = item.desc;
                tdDesc.title = item.desc;
                tr.appendChild(tdDesc);

                // Checkbox + color dot
                const tdChk = document.createElement('td');
                tdChk.className = 'col-chk';
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.dataset.key = item.key;
                cb.dataset.color = color;
                cb.addEventListener('change', onCheckChange);
                const dot = document.createElement('span');
                dot.className = 'color-dot';
                dot.style.background = color;
                tdChk.appendChild(cb);
                tdChk.appendChild(dot);
                tr.appendChild(tdChk);

                // Origin input
                const tdOrigin = document.createElement('td');
                tdOrigin.className = 'col-origin';
                tdOrigin.style.position = 'relative';
                const inp = document.createElement('input');
                inp.type = 'text';
                inp.className = 'origin-input';
                inp.dataset.key = item.key;
                inp.dataset.id = item.id;
                inp.dataset.idx = idx;

                // Pre-fill: each GUI row corresponds to exactly one existingOrigin value
                // (empty string, or a single origin) — no ambiguity by construction.
                if (item.existingOrigin) {
                    inp.value = item.existingOrigin;
                    inp.readOnly = true;
                    inp.classList.add('locked');
                    inp.title = 'מקור קיים - נעול';
                }

                inp.addEventListener('keydown', onOriginKey);
                inp.addEventListener('input', onOriginInput);
                inp.addEventListener('blur', () => {
                    setTimeout(() => removeAutocomplete(inp), 150);
                });
                tdOrigin.appendChild(inp);
                tr.appendChild(tdOrigin);

                tbody.appendChild(tr);
            });

            focusDefaultOrigin();
        }

        // ─── Focus first empty after last filled ───
        function focusDefaultOrigin() {
            let lastFilledIdx = -1;
            idData.forEach((item, idx) => {
                if (item.existingOrigin) {
                    lastFilledIdx = idx;
                }
            });

            const targetIdx = lastFilledIdx + 1;
            const targetInp = document.querySelector(`.origin-input[data-idx="${targetIdx}"]`) ||
                document.querySelector(`.origin-input[data-idx="0"]`);

            if (targetInp) {
                targetInp.focus();
                targetInp.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // ─── Enter in origin → autocomplete or move down ───
        function onOriginKey(e) {
            if (e.target.readOnly) return;
            const inp = e.target;

            const list = inp.parentElement.querySelector('.autocomplete-list');
            if (list) {
                const items = list.querySelectorAll('div');
                const sel = list.querySelector('.selected');
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (!sel && items.length) { items[0].classList.add('selected'); }
                    else if (sel && sel.nextElementSibling) {
                        sel.classList.remove('selected');
                        sel.nextElementSibling.classList.add('selected');
                    }
                    return;
                }
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (sel && sel.previousElementSibling) {
                        sel.classList.remove('selected');
                        sel.previousElementSibling.classList.add('selected');
                    }
                    return;
                }
                if (e.key === 'Enter' && sel) {
                    e.preventDefault();
                    inp.value = sel.textContent;
                    trackOrigin(inp.value);
                    removeAutocomplete(inp);
                    moveToNextOrigin(inp);
                    return;
                }
            }

            if (e.key === 'Enter') {
                e.preventDefault();
                trackOrigin(inp.value);
                removeAutocomplete(inp);
                moveToNextOrigin(inp);
            }
        }

        function moveToNextOrigin(inp) {
            const idx = parseInt(inp.dataset.idx);
            const next = document.querySelector(`.origin-input[data-idx="${idx + 1}"]`);
            if (next) next.focus();
        }

        function trackOrigin(val) {
            val = val.trim();
            if (val && !userOrigins[val]) userOrigins[val] = true;
        }

        // ─── Autocomplete on input ───
        function onOriginInput(e) {
            const inp = e.target;
            if (inp.readOnly) return;
            const val = inp.value.trim().toLowerCase();
            removeAutocomplete(inp);
            if (!val) return;

            const keys = Object.keys(userOrigins);
            const matches = keys.filter(k => k.toLowerCase().startsWith(val) && k.toLowerCase() !== val);
            if (!matches.length) return;

            const list = document.createElement('div');
            list.className = 'autocomplete-list';
            matches.forEach(m => {
                const d = document.createElement('div');
                d.textContent = m;
                d.addEventListener('mousedown', () => {
                    inp.value = m;
                    trackOrigin(m);
                    removeAutocomplete(inp);
                });
                list.appendChild(d);
            });
            inp.parentElement.appendChild(list);
            list.style.top = (inp.offsetTop + inp.offsetHeight) + 'px';
            list.style.left = inp.offsetLeft + 'px';
            list.style.width = inp.offsetWidth + 'px';
        }

        function removeAutocomplete(inp) {
            const list = inp.parentElement.querySelector('.autocomplete-list');
            if (list) list.remove();
        }

        // ─── Checkbox toggle ───
        function onCheckChange(e) {
            const key = e.target.dataset.key;
            const color = e.target.dataset.color;
            if (e.target.checked) showMarkers(key, color);
            else hideMarkers(key);
        }

        function showMarkers(key, color) {
            if (markerGroups[key]) { markerGroups[key].addTo(map); return; }
            const item = idData.find(d => d.key === key);
            if (!item) return;
            const lg = L.layerGroup();
            const seen = new Set();
            item.rows.forEach(r => {
                const city = r.cities?.trim();
                if (!city || seen.has(city)) return;
                seen.add(city);
                const c = coordMap[city];
                if (!c) return;
                const popupText = `<div dir="rtl" style="text-align:right;font-size:1.2em;">
          <b>${city}</b><br>${r.time}<br>${r.description || ''}</div>`;
                L.circleMarker([c.lat, c.lng], {
                    radius: 6, fillColor: color, color: color,
                    weight: 1, opacity: 1, fillOpacity: 0.75
                }).bindPopup(popupText).addTo(lg);
            });
            markerGroups[key] = lg;
            lg.addTo(map);
        }

        function hideMarkers(key) {
            if (markerGroups[key]) map.removeLayer(markerGroups[key]);
        }

        // ─── Download ───
        document.getElementById('download-btn').addEventListener('click', () => {
            // Collect user-entered origins keyed by the full composite key (id__desc__existingOrigin).
            // This ensures that rows split by threat type or by pre-existing origin each get
            // their own independently assigned origin, with no cross-contamination.
            const originByKey = {};
            document.querySelectorAll('.origin-input').forEach(inp => {
                const v = inp.value.trim();
                const key = inp.dataset.key;
                if (v) originByKey[key] = v;
            });

            // For each raw CSV row, reconstruct its composite key and look up the assigned origin.
            const outRows = filteredRows.map(r => {
                const desc = (r.description || '').trim();
                const existingOrigin = (r.origin || '').trim();
                const key = r.id + '__' + desc + '__' + existingOrigin;
                const o = originByKey[key] || existingOrigin || '';
                return { ...r, origin: o };
            });

            const header = 'time,cities,threat,id,description,origin';
            const lines = [header];
            outRows.forEach(r => {
                const cities = r.cities.includes(',') ? `"${r.cities}"` : r.cities;
                lines.push(`${r.time},${cities},${r.threat},${r.id},${r.description || ''},${r.origin}`);
            });
            const csv = lines.join('\n');

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'alarms_origin.csv';
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</body>

</html>
