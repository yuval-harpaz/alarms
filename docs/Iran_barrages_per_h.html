<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>השוואת התקפות איראן: 2025 מול 2026</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            margin: 0;
            padding: 20px;
            background: #121212;
            color: #e0e0e0;
        }

        #controls {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 10px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 5px 12px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Assistant', sans-serif;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(118, 75, 162, 0.4);
        }

        #chart {
            width: 100%;
            height: 85vh;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff4b2b, #ff416c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body>
    <h1>השוואת התקפות איראן: 2025 מול 2026</h1>
    <div id="controls">
        <button id="toggleBtn">הצג תצוגה מקוצרת (שעות חופפות)</button>
    </div>
    <div id="chart"></div>

    <script>
        // Load the CSV data
        d3.csv("https://raw.githubusercontent.com/yuval-harpaz/alarms/refs/heads/master/data/alarms_comparison.csv").then(data => {
            // Process data for Plotly
            const data2025 = data.filter(d => d.year === '2025');
            const data2026 = data.filter(d => d.year === '2026');

            // Find min/max for Full vs Trimmed
            const hours2025 = data2025.map(d => +d.hour);
            const hours2026 = data2026.map(d => +d.hour);

            const fullRange = [0, Math.max(...hours2025, ...hours2026) + 1];
            const maxCommon = Math.min(Math.max(...hours2025), Math.max(...hours2026));
            const trimmedRange = [0, maxCommon + 1];

            const fullTicks = { dtick: 24, tick0: 0 };
            const trimmedTicks = { dtick: 6, tick0: 0 };

            let isTrimmed = false;

            const trace1_2025 = {
                x: data2025.map(d => +d.hour),
                y: data2025.map(d => +d.barrages),
                name: '2025 (21:10)',
                type: 'bar',
                marker: { color: '#ff4b2b' },
                xaxis: 'x',
                yaxis: 'y',
                legendgroup: '2025'
            };

            const trace1_2026 = {
                x: data2026.map(d => +d.hour),
                y: data2026.map(d => +d.barrages),
                name: '2026 (10:10)',
                type: 'bar',
                marker: { color: '#00d2ff' },
                xaxis: 'x',
                yaxis: 'y',
                legendgroup: '2026'
            };

            const trace2_2025 = {
                x: data2025.map(d => +d.hour),
                y: data2025.map(d => +d.alarms),
                name: '2025 (21:10)',
                type: 'bar',
                marker: { color: '#ff4b2b' },
                xaxis: 'x2',
                yaxis: 'y2',
                legendgroup: '2025',
                showlegend: false
            };

            const trace2_2026 = {
                x: data2026.map(d => +d.hour),
                y: data2026.map(d => +d.alarms),
                name: '2026 (10:10)',
                type: 'bar',
                marker: { color: '#00d2ff' },
                xaxis: 'x2',
                yaxis: 'y2',
                legendgroup: '2026',
                showlegend: false
            };

            const layout = {
                template: 'plotly_dark',
                grid: { rows: 2, columns: 1, pattern: 'independent' },
                barmode: 'group',
                title: {
                    text: 'השוואת מטחים ואזעקות',
                    font: { size: 24 }
                },
                annotations: [
                    {
                        text: 'מטחים\\שעה',
                        font: { size: 18, color: '#000000' },
                        showarrow: false,
                        align: 'center',
                        x: 0.5,
                        y: 1.05,
                        xref: 'paper',
                        yref: 'paper'
                    },
                    {
                        text: 'אזעקות\\שעה',
                        font: { size: 18, color: '#000000' },
                        showarrow: false,
                        align: 'center',
                        x: 0.5,
                        y: 0.45,
                        xref: 'paper',
                        yref: 'paper'
                    }
                ],
                xaxis: { anchor: 'y', range: fullRange, ...fullTicks, showticklabels: false },
                yaxis: { title: 'מספר מטחים', anchor: 'x' },
                xaxis2: { title: 'שעה מתחילת ההתקפה', anchor: 'y2', range: fullRange, ...fullTicks },
                yaxis2: { title: 'מספר אזעקות', anchor: 'x2' },
                legend: {
                    orientation: 'h',
                    y: -0.15,
                    x: 0.5,
                    xanchor: 'center'
                },
                margin: { l: 50, r: 50, b: 100, t: 150, pad: 10 },
                hovermode: 'x unified'
            };

            Plotly.newPlot('chart', [trace1_2025, trace1_2026, trace2_2025, trace2_2026], layout);

            // Toggle functionality
            document.getElementById('toggleBtn').addEventListener('click', function () {
                isTrimmed = !isTrimmed;
                const newRange = isTrimmed ? trimmedRange : fullRange;
                const newTicks = isTrimmed ? trimmedTicks : fullTicks;
                this.innerText = isTrimmed ? 'הצג תצוגה מלאה' : 'הצג תצוגה מקוצרת (שעות חופפות)';

                Plotly.relayout('chart', {
                    'xaxis.range': newRange,
                    'xaxis.dtick': newTicks.dtick,
                    'xaxis2.range': newRange,
                    'xaxis2.dtick': newTicks.dtick
                });
            });
        });
    </script>
</body>

</html>
