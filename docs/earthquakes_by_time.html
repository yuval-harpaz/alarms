<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Earthquakes in Israel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css" />
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    #floating-title {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.9);
      padding: 10px 20px;
      border-radius: 8px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      z-index: 1000;
      text-align: center;
    }

    #title-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 5px;
    }

    #lang-toggle {
      padding: 3px 8px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 10px;
      font-weight: bold;
    }

    #lang-toggle:hover {
      background: #0056b3;
    }

    #csv-link {
      padding: 3px 8px;
      background: #28a745;
      color: white;
      text-decoration: none;
      border-radius: 3px;
      font-size: 10px;
      font-weight: bold;
      display: inline-block;
    }

    #csv-link:hover {
      background: #218838;
    }
  </style>
</head>

<body>
  <div id="floating-title">
    <div id="title-header">
      <div id="main-title"></div>
      <button id="lang-toggle" onclick="toggleLanguage()">English</button>
      <a id="csv-link" href="https://github.com/yuval-harpaz/alarms/blob/master/data/earthquakes.csv" target="_blank">CSV</a>
    </div>
    <div id="title-rest"></div>
  </div>
  <div id="map"></div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <script>
    let currentLang = 'he';
    let layerControl;
    let lastQuakeTime = null;

    const map = L.map('map').setView([31.5, 34.75], 7.5);

    // GovMap Tiles (Hebrew)
    const govmapTiles = L.tileLayer('https://cdnil.govmap.gov.il/xyz/heb/{z}/{x}/{y}.png', {
      maxZoom: 16,
      attribution: '© המרכז למיפוי ישראל www.govmap.gov.il'
    });

    // CartoDB Tiles (English)
    const cartodbTiles = L.tileLayer('https://cartodb-basemaps-{s}.global.ssl.fastly.net/light_all/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="http://cartodb.com/attributions">CartoDB</a>',
      subdomains: 'abcd',
      maxZoom: 19
    });

    // Start with Hebrew tiles
    govmapTiles.addTo(map);

    // Define overlapping layers for legend toggle
    const layers = {
      'one day': L.layerGroup(),
      'one week': L.layerGroup(),
      'one month': L.layerGroup(),
      'one year': L.layerGroup(),
      'more than a year': L.layerGroup()
    };

    const colors = {
      'one day': '#000000',
      'one week': '#FF0000',
      'one month': '#FFBF80',
      'one year': '#00FF80',
      'more than a year': '#0000FF'
    };

    const opacities = {
      'one day': 1.0,
      'one week': 1.0,
      'one month': 1.0,
      'one year': 1.0,
      'more than a year': 0.2
    };

    // Add all layers to map by default
    Object.values(layers).forEach(l => l.addTo(map));

    // Language-specific text
    const translations = {
      he: {
        title: 'רעידות אדמה שנרשמו בישראל מאז 2000',
        source: 'נתונים מ<a href="https://eq.gsi.gov.il/heb/earthquake/lastEarthquakes.php" target="_blank">המכון הגיאולוגי</a>',
        lastQuake: 'רעידה אחרונה',
        oneDay: 'יום אחד',
        oneWeek: 'שבוע אחד',
        oneMonth: 'חודש אחד',
        oneYear: 'שנה אחת',
        moreThanYear: 'יותר משנה',
        depth: 'עומק',
        buttonText: 'En'
      },
      en: {
        title: 'Earthquakes recorded in Israel since 2000',
        source: 'Data from <a href="https://eq.gsi.gov.il/heb/earthquake/lastEarthquakes.php" target="_blank">THE GEOLOGICAL SURVEY OF ISRAEL</a>',
        lastQuake: 'last quake',
        oneDay: 'one day',
        oneWeek: 'one week',
        oneMonth: 'one month',
        oneYear: 'one year',
        moreThanYear: 'more than a year',
        depth: 'depth',
        buttonText: 'עב'
      }
    };

    function updateLanguage() {
      const t = translations[currentLang];
      
      // Update title
      document.getElementById('main-title').innerHTML = t.title;
      let restHTML = t.source;
      if (lastQuakeTime) {
        const lastQuakeStr = lastQuakeTime.toISOString().substring(0, 16).replace('T', ' ');
        restHTML += `<br>${t.lastQuake}: ${lastQuakeStr}`;
      }
      document.getElementById('title-rest').innerHTML = restHTML;
      document.getElementById('lang-toggle').textContent = t.buttonText;

      // Update layer control
      if (layerControl) {
        map.removeControl(layerControl);
      }

      const overlays = {
        [`<span style="color: #000000;">${t.oneDay}</span>`]: layers['one day'],
        [`<span style="color: #FF0000;">${t.oneWeek}</span>`]: layers['one week'],
        [`<span style="color: #FFBF80;">${t.oneMonth}</span>`]: layers['one month'],
        [`<span style="color: #00FF80;">${t.oneYear}</span>`]: layers['one year'],
        [`<span style="color: #0000FF;">${t.moreThanYear}</span>`]: layers['more than a year']
      };

      layerControl = L.control.layers(null, overlays, { collapsed: false, position: 'topleft' }).addTo(map);
    }

    function toggleLanguage() {
      currentLang = currentLang === 'he' ? 'en' : 'he';
      
      // Switch tiles
      if (currentLang === 'he') {
        map.removeLayer(cartodbTiles);
        map.addLayer(govmapTiles);
      } else {
        map.removeLayer(govmapTiles);
        map.addLayer(cartodbTiles);
      }
      
      updateLanguage();
    }

    // Initialize with Hebrew
    updateLanguage();

    // Load data
    Papa.parse('https://raw.githubusercontent.com/yuval-harpaz/alarms/refs/heads/master/data/earthquakes.csv', {
      download: true,
      header: true,
      dynamicTyping: true,
      skipEmptyLines: true,
      complete: function (results) {
        const now = new Date();
        
        results.data.forEach(row => {
          if (!row.Lat || !row.Long) return;

          const eventTime = new Date(row['DateTime(UTC)']);
          const diffDays = (now - eventTime) / (1000 * 60 * 60 * 24);
          
          // Track the most recent earthquake
          if (!lastQuakeTime || eventTime > lastQuakeTime) {
            lastQuakeTime = eventTime;
          }

          let group = 'more than a year';
          if (diffDays <= 1) group = 'one day';
          else if (diffDays <= 7) group = 'one week';
          else if (diffDays <= 30) group = 'one month';
          else if (diffDays <= 365) group = 'one year';

          const color = colors[group];
          const opacity = opacities[group];
          const mag = row.Mag || 0;
          const radius = Math.max(3, Math.pow(mag, 2) / 2); // Minimum radius of 3

          const depthStr = row['Depth(Km)'] > 0 ? `, depth: ${row['Depth(Km)'].toFixed(1)}Km` : '';
          const tooltip = `${row['DateTime(UTC)'].replace('T', ' ').substring(0, 16)}<br>M: ${mag}${depthStr}`;

          L.circleMarker([row.Lat, row.Long], {
            radius: radius,
            fillColor: color,
            color: color,
            weight: 1,
            opacity: opacity,
            fillOpacity: opacity
          }).bindTooltip(tooltip).addTo(layers[group]);
        });
        
        // Update title with last quake time after data loads
        updateLanguage();
      }
    });
  </script>
  </script>
</body>

</html>
