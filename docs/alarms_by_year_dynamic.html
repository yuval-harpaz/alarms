<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="author" content="Yuval Harpaz, Sagi Or">
    <meta name="Description" content="A map showing rocket alarms in Israel since July 2019, updated dynamically from GitHub data.">
    <meta name="keywords" content="map, rockets, alarms, Israel, Gaza, צבע אדום, emergency, folium, leaflet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Alarms in Israel (Dynamic)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        .title-container {
            position: relative;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
        .leaflet-control-layers-expanded { max-height: 70vh; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="title-container">
        <h3 align="center" style="font-size:16px" id="title"></h3>
    </div>
    <div id="map"></div>
    <script>
        const GITHUB_RAW = 'https://raw.githubusercontent.com/yuval-harpaz/alarms/refs/heads/master/';
        const COLOR_PALETTE = [
            "#cccccc", "#4063d8", "#389826", "#9558b2", "#cb3e3e", "#ffb300", "#fb9b06", "#000000"
        ];
        const YEAR_START = 2019;
        let currentYear = new Date().getFullYear();
        let gnames = [];
        for (let y = YEAR_START; y <= currentYear; y++) gnames.push(String(y));
        gnames.push('7 days', '24 h');

        function getColor(idx) {
            return COLOR_PALETTE[idx % COLOR_PALETTE.length];
        }

        async function fetchCSV(filename) {
            const response = await fetch(GITHUB_RAW + filename);
            const text = await response.text();
            return new Promise((resolve) => {
                Papa.parse(text, {
                    header: true,
                    dynamicTyping: true,
                    complete: (results) => resolve(results.data)
                });
            });
        }

        function parseDate(str) {
            // Handles both ISO and 'YYYY-MM-DD HH:MM:SS' formats
            if (!str) return null;
            return new Date(str.replace(' ', 'T'));
        }

        async function initMap() {
            const coord = await fetchCSV('data/coord.csv');
            const alarms = await fetchCSV('data/alarms.csv');
            const center = [31.41745, 35.06155];

            const map = L.map('map').setView(center, 7.5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
            }).addTo(map);

            document.getElementById('title').innerHTML =
                `<b>Rocket alarms in Israel since July 2019, data from <a href="https://www.oref.org.il" target="_blank">THE NATIONAL EMERGENCY PORTAL</a>
                via <a href="https://www.tzevaadom.co.il/" target="_blank">צבע אדום</a>. Last checked: ${new Date().toLocaleString('he-IL', { timeZone: 'Asia/Jerusalem' })}</b>`;

            // Prepare alarm data
            alarms.forEach(a => { a.dateObj = parseDate(a.time); });
            // Filter out alarms with invalid dateObj
            const validAlarms = alarms.filter(a => a.dateObj instanceof Date && !isNaN(a.dateObj));
            // Prepare coord lookup with numeric values
            const coordMap = {};
            coord.forEach(c => {
                const lat = Number(c.lat);
                const lng = Number(c.long);
                if (!isNaN(lat) && !isNaN(lng)) {
                    coordMap[c.loc] = [lat, lng];
                }
            });

            // Layer groups
            const layers = {};
            gnames.forEach((gn, i) => {
                layers[gn] = L.layerGroup();
            });

            // By year
            let markerCount = 0;
            for (let year = YEAR_START; year <= currentYear; year++) {
                const idx = validAlarms.filter(a => a.dateObj.getFullYear() === year && a.threat === 0);
                const locs = {};
                idx.forEach(a => {
                    if (!locs[a.cities]) locs[a.cities] = 0;
                    locs[a.cities]++;
                });
                Object.entries(locs).forEach(([loc, count]) => {
                    const coords = coordMap[loc];
                    if (coords) {
                        L.circleMarker(coords, {
                            radius: Math.max(Math.sqrt(count) * 2, 1),
                            fillColor: getColor(year - YEAR_START),
                            color: getColor(year - YEAR_START),
                            opacity: 0.5,
                            fillOpacity: 0.5
                        }).bindTooltip(`${loc} (${year}): ${count}`).addTo(layers[String(year)]);
                        markerCount++;
                    } else {
                        // Log missing or invalid coordinates
                        console.warn('No valid coordinates for location:', loc);
                    }
                });
            }

            // Past 7 days / 24 hours
            const now = new Date();
            const dif_days = validAlarms.map(a => (now - a.dateObj) / (1000 * 60 * 60 * 24));
            const past_7d = validAlarms.filter((a, i) => dif_days[i] <= 7 && a.threat === 0);
            const past_24h = validAlarms.filter((a, i) => dif_days[i] <= 1 && a.threat === 0);

            [past_7d, past_24h].forEach((group, idx) => {
                const locs = {};
                group.forEach(a => {
                    if (!locs[a.cities]) locs[a.cities] = 0;
                    locs[a.cities]++;
                });
                Object.entries(locs).forEach(([loc, count]) => {
                    const coords = coordMap[loc];
                    if (coords) {
                        L.circleMarker(coords, {
                            radius: Math.max(Math.sqrt(count) * 2, 1),
                            fillColor: getColor(gnames.length - 2 + idx),
                            color: getColor(gnames.length - 2 + idx),
                            opacity: 0,
                            fillOpacity: 0.5
                        }).bindTooltip(`${loc}: ${count}`).addTo(layers[gnames[gnames.length - 2 + idx]]);
                        markerCount++;
                    } else {
                        // Log missing or invalid coordinates
                        console.warn('No valid coordinates for location:', loc);
                    }
                });
            });

            // Add layers and control
            Object.entries(layers).forEach(([name, layer]) => {
                layer.addTo(map);
            });
            L.control.layers(null, layers, { collapsed: false, position: 'topleft' }).addTo(map);

            // If no markers, show a message
            if (markerCount === 0) {
                L.popup()
                    .setLatLng(center)
                    .setContent("No alarm data available or coordinates missing.<br>Check your CSV files and browser console for errors.")
                    .openOn(map);
            }
        }

        initMap();
    </script>
</body>
</html>
